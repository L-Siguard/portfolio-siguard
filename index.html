<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L. SIGUARD — Artist 2D/3D</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@400;500;600;700;800&display=swap');

:root {
  --bg: #d8d5d0;
  --fg: #1a1a1a;
  --accent: #3dffc2;
  --accent-dim: #2bc99a;
  --grey-mid: #888;
  --grey-light: #bbb;
  --font: 'Barlow Condensed', sans-serif;
  --font-cat: 'Barlow', sans-serif;
  --thumb-h: 360px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
  overflow-x: hidden;
  cursor: none;
}

body::after {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9998;
}

/* ══ CURSOR ══ */
#cursor {
  position: fixed; width: 20px; height: 20px;
  pointer-events: none; z-index: 10000;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  transform: translate(-50%, -50%);
}
#cursor::before, #cursor::after {
  content: ''; position: absolute;
  background-color: var(--fg); transition: background-color 0.2s;
}
#cursor::before { width: 100%; height: 1.5px; }
#cursor::after { width: 1.5px; height: 100%; }
#cursor.active { transform: translate(-50%, -50%) rotate(45deg) scale(1.2); }
#cursor.active::before, #cursor.active::after { background-color: var(--accent); }

/* ══ BACKGROUND ══ */
#bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background-size: cover; background-position: center;
  opacity: 0; transition: opacity 1.2s ease;
}
#bg-layer.loaded { opacity: 1; }
#bg-layer.has-image::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to right, rgba(216,213,208,0.95) 0%, rgba(216,213,208,0.8) 25%, rgba(0,0,0,0.1) 100%);
}

/* ══ LAYOUT ══ */
#app {
  display: flex; min-height: 100vh;
  padding: 48px 56px; position: relative;
}

.sidebar {
  flex: 0 0 220px; display: flex;
  flex-direction: column; position: relative; z-index: 2;
}

.site-title {
  font-size: 32px; font-weight: 500;
  letter-spacing: 8px; text-transform: uppercase;
  line-height: 1; cursor: none;
  text-decoration: none; color: var(--fg); display: block;
  transition: color 0.2s;
}
.site-title:hover { color: var(--accent-dim); }

.site-subtitle {
  font-size: 13px; font-weight: 500;
  letter-spacing: 4px; color: var(--grey-mid);
  margin-top: 4px; text-transform: uppercase;
}

.nav-aligner { 
  flex: 1; 
  display: flex; 
  align-items: center; 
}

.nav-inner {
  height: var(--thumb-h); display: flex;
  flex-direction: column; justify-content: space-between;
  align-items: flex-start; width: 100%;
}

.cat-main {
  font-family: var(--font-cat); font-size: 26px; font-weight: 800;
  text-transform: uppercase; cursor: none; letter-spacing: 1px;
  transition: color 0.3s cubic-bezier(0.16,1,0.3,1);
  padding: 0; margin: 0; line-height: 1.2;
  display: block; background: none; border: none;
  color: var(--fg); text-align: left;
}
.cat-main:hover { color: var(--accent-dim); }
.cat-main.active { color: var(--accent); }

.sub-item {
  font-family: var(--font); font-size: 13px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 3px; padding: 3px 0;
  cursor: none; color: var(--fg); background: none; border: none;
  display: block; text-align: left;
  opacity: 0; transform: translateX(-15px);
  transition: opacity 0.5s cubic-bezier(0.16,1,0.3,1),
              transform 0.5s cubic-bezier(0.16,1,0.3,1), color 0.25s ease;
}
.sub-item.visible { opacity: 1; transform: translateX(0); }
.sub-item:hover { color: var(--accent-dim); }
.sub-item.active { color: var(--accent); }

.nav-bottom-link {
  font-family: var(--font-cat); font-size: 26px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 1px; cursor: none;
  line-height: 1.2; display: block; background: none; border: none;
  color: var(--fg); text-align: left;
  transition: color 0.3s cubic-bezier(0.16,1,0.3,1);
}
.nav-bottom-link:hover { color: var(--accent-dim); }
.nav-bottom-link.active { color: var(--accent); }

/* ══ CONTENT ══ */
.content-area {
  flex: 1; display: flex; gap: 24px;
  align-items: center; /* Rétablit le centrage vertical original */
  position: relative; z-index: 2; margin-left: 24px;
}

/* ══ GRILLE 4 COLONNES AVEC HAUTEUR ORIGINALE ══ */
.thumbs-strip { flex: 0 0 auto; }
.thumb-col { 
  display: grid; 
  grid-template-columns: repeat(4, 58px); /* Toujours 4 colonnes de 58px */
  gap: 10px; 
  height: auto; 
}

.thumb-wrapper { display: flex; flex-direction: column; width: 58px; }

.thumb-item {
  width: 58px; 
  height: 240px; 
  cursor: none; overflow: hidden;
  position: relative; opacity: 0; transform: translateX(40px);
  transition: outline-color 0.2s;
}
.thumb-item.slide-in { animation: thumbSlide 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
.thumb-item:hover img { opacity: 0.85; }
.thumb-item.active { outline: 2px solid var(--accent); outline-offset: -2px; }
.thumb-item img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.2s; }

@keyframes thumbSlide {
  from { opacity: 0; transform: translateX(40px); }
  to { opacity: 1; transform: translateX(0); }
}

.thumb-label {
  font-size: 11px; font-weight: 500; color: var(--grey-light);
  letter-spacing: 1px; text-align: right; margin-top: 6px;
  opacity: 0; transform: translateX(20px); transition: color 0.25s;
}
.thumb-label.slide-in { animation: thumbSlide 0.45s cubic-bezier(0.16,1,0.3,1) forwards; }
.thumb-wrapper:hover .thumb-label { color: var(--fg); }
.thumb-wrapper.active .thumb-label { color: var(--accent); }

/* ══ PREVIEW (Inchangé) ══ */
.main-preview {
  display: flex;
  align-items: center; justify-content: center;
  overflow: hidden;
}

.preview-wrap {
  max-width: 100%; overflow: hidden;
  box-shadow: 8px 12px 40px rgba(0,0,0,0.22);
  clip-path: inset(0 100% 0 0); cursor: none;
}
.preview-wrap.reveal { animation: clipReveal 0.6s cubic-bezier(0.16,1,0.3,1) forwards; }
.preview-wrap img {
  width: 100%; height: auto; max-height: 75vh; object-fit: contain; display: block;
  filter: blur(12px); opacity: 0.7;
  animation: imgSharp 0.55s cubic-bezier(0.16,1,0.3,1) 0.15s forwards;
}

@keyframes clipReveal {
  from { clip-path: inset(0 100% 0 0); }
  to { clip-path: inset(0 0 0 0); }
}
@keyframes imgSharp { to { filter: blur(0); opacity: 1; } }

/* ══ LOADING ══ */
#loading-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999; transition: opacity 0.5s ease;
}
#loading-screen.fade-out { opacity: 0; pointer-events: none; }
.loading-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); margin: 0 4px;
  animation: loadPulse 1.2s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes loadPulse {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* ══ IMAGE CAPTION ══ */
.preview-container {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 400px; overflow: hidden;
}
.preview-inner {
  display: flex; flex-direction: column;
  align-items: flex-start;
  max-width: 100%;
}
.preview-caption {
  font-family: var(--font);
  font-size: 13px; font-weight: 400;
  letter-spacing: 4px; text-transform: uppercase;
  color: var(--grey-mid);
  margin-top: 16px;
  opacity: 0; transform: translateY(8px);
  transition: opacity 0.5s ease 0.3s, transform 0.5s ease 0.3s;
}
.preview-caption.visible { opacity: 1; transform: translateY(0); }

/* ══ SHARE (Landing) ══ */
.share-section {
  position: fixed; bottom: 48px; left: 56px; z-index: 3;
}
.share-toggle {
  font-family: var(--font-cat); font-size: 13px; font-weight: 400;
  letter-spacing: 4px; text-transform: uppercase;
  color: var(--fg); background: none; border: none;
  cursor: none; padding: 0;
  transition: color 0.3s;
}
.share-toggle:hover { color: var(--accent-dim); }

.share-links {
  display: flex; gap: 16px; margin-top: 6px;
  overflow: hidden;
}
.share-link {
  font-family: var(--font); font-size: 13px; font-weight: 500;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--fg); text-decoration: none;
  cursor: none; white-space: nowrap;
  opacity: 0; transform: translateX(-20px);
  transition: opacity 0.4s cubic-bezier(0.16,1,0.3,1),
              transform 0.4s cubic-bezier(0.16,1,0.3,1),
              color 0.25s ease;
}
.share-link.visible { opacity: 1; transform: translateX(0); }
.share-link:hover { color: var(--accent-dim); }

@media (max-width: 900px) {
  #app { flex-direction: column; padding: 32px 24px; }
  .sidebar { flex: none; }
  .nav-inner { height: auto; }
  .content-area { flex-direction: column; margin-left: 0; }
  .thumb-col { grid-template-columns: repeat(4, 1fr); height: auto; }
  body { cursor: auto; }
  #cursor { display: none; }
  .share-section { position: fixed; bottom: 24px; left: 24px; }
  .share-toggle, .share-link { cursor: auto; }
}
</style>
</head>
<body>

<div id="loading-screen">
  <div style="display:flex">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
</div>

<div id="cursor"></div>
<div id="bg-layer"></div>

<div id="app">
  <div class="sidebar">
    <div>
      <a class="site-title" id="home-link">L. SIGUARD</a>
      <div class="site-subtitle">ARTIST 2D/3D</div>
    </div>
    <div class="nav-aligner">
      <div class="nav-inner" id="nav-inner"></div>
    </div>
  </div>
  <div class="content-area">
    <div class="thumbs-strip" id="thumbs-strip"></div>
    <div class="preview-container" id="preview-container">
      <div class="preview-inner">
        <div class="main-preview" id="main-preview"></div>
        <div class="preview-caption" id="preview-caption"></div>
      </div>
    </div>
  </div>
</div>

<div class="share-section" id="share-section" style="display:none;">
  <button class="share-toggle" id="share-toggle">SHARE</button>
  <div class="share-links" id="share-links"></div>
</div>

<script>
// LE JAVASCRIPT SANITY RESTE INCHANGÉ POUR NE RIEN CASSER
const SANITY_PROJECT_ID = 'obqf97j9';
const SANITY_DATASET    = 'production';
const SANITY_API_VERSION = '2024-01-01';

async function sanityFetch(query) {
  const encoded = encodeURIComponent(query);
  const url = `https://${SANITY_PROJECT_ID}.api.sanity.io/v${SANITY_API_VERSION}/data/query/${SANITY_DATASET}?query=${encoded}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Sanity error: ${res.status}`);
  const json = await res.json();
  return json.result;
}

let portfolioData = null;
let state = {
  activeCat: null,
  activeSubcat: null,
  activeImage: 0,
  isLanding: true,
};

const cursor = document.getElementById('cursor');
let cx = -50, cy = -50, tx = -50, ty = -50;
document.addEventListener('mousemove', e => { tx = e.clientX; ty = e.clientY; });
(function tickCursor() {
  cx += (tx - cx) * 0.18;
  cy += (ty - cy) * 0.18;
  cursor.style.left = cx + 'px';
  cursor.style.top = cy + 'px';
  requestAnimationFrame(tickCursor);
})();
const HOVER_SEL = 'a, button, .cat-main, .sub-item, .thumb-item, .thumb-wrapper, .preview-wrap, .nav-bottom-link, .share-toggle, .share-link';
document.addEventListener('mouseover', e => { if (e.target.closest(HOVER_SEL)) cursor.classList.add('active'); });
document.addEventListener('mouseout',  e => { if (e.target.closest(HOVER_SEL)) cursor.classList.remove('active'); });

function applyAccentColor(hex) {
  if (!hex) return;
  document.documentElement.style.setProperty('--accent', hex);
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const dim = `rgb(${Math.round(r*0.78)}, ${Math.round(g*0.78)}, ${Math.round(b*0.78)})`;
  document.documentElement.style.setProperty('--accent-dim', dim);
}

function renderBg(isLanding) {
  const el = document.getElementById('bg-layer');
  el.classList.remove('loaded', 'has-image');
  const url = isLanding ? portfolioData?.settings?.landingBg : portfolioData?.settings?.siteBg;
  if (url) {
    el.classList.add('has-image');
    el.style.backgroundImage = `url(${url})`;
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('loaded')));
  } else {
    el.style.backgroundImage = 'none';
    el.classList.add('loaded');
  }
}

document.getElementById('home-link').onclick = e => {
  e.preventDefault();
  state.activeCat = null; state.activeSubcat = null; state.activeImage = 0; state.isLanding = true;
  renderBg(true); renderNav(); renderThumbs(); renderPreview(); renderShare();
};

function renderNav() {
  const container = document.getElementById('nav-inner');
  container.innerHTML = '';
  if (!portfolioData) return;

  const topEl = document.createElement('div');
  const midEl = document.createElement('div'); midEl.className = 'nav-mid';
  const bottomEl = document.createElement('div');

  portfolioData.categories.forEach(cat => {
    const isActive = state.activeCat === cat._id;
    if (!cat.subcategories || cat.subcategories.length === 0) {
      const btn = document.createElement('button');
      btn.className = `nav-bottom-link ${isActive ? 'active' : ''}`;
      btn.textContent = cat.name;
      btn.onclick = () => {
        state.activeCat = cat._id; state.activeSubcat = null; state.activeImage = 0; state.isLanding = false;
        renderBg(false); renderNav(); animateThumbs(); renderPreview(); renderShare();
      };
      bottomEl.appendChild(btn);
    } else {
      const btn = document.createElement('button');
      btn.className = `cat-main ${isActive ? 'active' : ''}`;
      btn.textContent = cat.name;
      btn.onclick = () => {
        if (state.activeCat === cat._id) { state.activeCat = null; state.activeSubcat = null; state.isLanding = true; }
        else { state.activeCat = cat._id; state.isLanding = false; if (cat.subcategories.length > 0) state.activeSubcat = cat.subcategories[0]._id; }
        state.activeImage = 0; renderBg(state.isLanding); renderNav(); animateThumbs(); renderPreview(); renderShare();
      };
      topEl.appendChild(btn);
      if (isActive) {
        cat.subcategories.forEach((sub, si) => {
          const subBtn = document.createElement('button');
          subBtn.className = `sub-item ${state.activeSubcat === sub._id ? 'active' : ''}`;
          subBtn.textContent = sub.name;
          subBtn.onclick = e => { e.stopPropagation(); state.activeSubcat = sub._id; state.activeImage = 0; renderNav(); animateThumbs(); renderPreview(); };
          setTimeout(() => subBtn.classList.add('visible'), si * 60 + 40);
          midEl.appendChild(subBtn);
        });
      }
    }
  });
  container.appendChild(topEl); container.appendChild(midEl); container.appendChild(bottomEl);
}

function getActiveImages() {
  if (!portfolioData || !state.activeSubcat) return [];
  for (const cat of portfolioData.categories)
    for (const sub of (cat.subcategories || []))
      if (sub._id === state.activeSubcat) return sub.images || [];
  return [];
}

function animateThumbs() {
  const strip = document.getElementById('thumbs-strip');
  const imgs = getActiveImages();
  strip.innerHTML = '';
  if (imgs.length === 0) { renderPreview(); return; }
  const col = document.createElement('div'); col.className = 'thumb-col';
  imgs.forEach((imgRef, i) => {
    const wrapper = document.createElement('div');
    wrapper.className = `thumb-wrapper ${i === state.activeImage ? 'active' : ''}`;
    const thumb = document.createElement('div');
    thumb.className = `thumb-item ${i === state.activeImage ? 'active' : ''}`;
    const img = document.createElement('img');
    img.src = imgRef.url + '?w=600&auto=format';
    thumb.appendChild(img);
    thumb.onclick = () => {
      state.activeImage = i;
      document.querySelectorAll('.thumb-item').forEach((t,j) => t.classList.toggle('active', j === i));
      document.querySelectorAll('.thumb-wrapper').forEach((t,j) => t.classList.toggle('active', j === i));
      animatePreview();
    };
    const label = document.createElement('div');
    label.className = 'thumb-label'; label.textContent = String(i + 1).padStart(2, '0');
    wrapper.appendChild(thumb); wrapper.appendChild(label); col.appendChild(wrapper);
    setTimeout(() => { thumb.classList.add('slide-in'); label.classList.add('slide-in'); }, i * 60);
  });
  strip.appendChild(col); renderPreview();
}

function renderThumbs() { animateThumbs(); }

function renderPreview() {
  const p = document.getElementById('main-preview');
  const cap = document.getElementById('preview-caption');
  const imgs = getActiveImages();
  if (imgs.length === 0 || state.activeImage >= imgs.length) { p.innerHTML = ''; cap.textContent = ''; cap.classList.remove('visible'); return; }
  const imgData = imgs[state.activeImage];
  buildPreview(p, imgData.url + '?auto=format');
  if (imgData.alt) {
    cap.textContent = imgData.alt;
    requestAnimationFrame(() => cap.classList.add('visible'));
  } else {
    cap.textContent = ''; cap.classList.remove('visible');
  }
}

function animatePreview() {
  const p = document.getElementById('main-preview');
  const cap = document.getElementById('preview-caption');
  const imgs = getActiveImages();
  if (imgs.length === 0 || state.activeImage >= imgs.length) return;
  const imgData = imgs[state.activeImage];
  buildPreview(p, imgData.url + '?auto=format');
  cap.classList.remove('visible');
  if (imgData.alt) {
    cap.textContent = imgData.alt;
    requestAnimationFrame(() => requestAnimationFrame(() => cap.classList.add('visible')));
  } else {
    cap.textContent = '';
  }
}

function buildPreview(container, src) {
  const w = document.createElement('div'); w.className = 'preview-wrap';
  const img = document.createElement('img'); img.src = src;
  w.appendChild(img);
  w.onclick = () => window.open(src, '_blank');
  container.innerHTML = ''; container.appendChild(w);
  void w.offsetWidth; w.classList.add('reveal');
}

// ══ SHARE SECTION ══
let shareData = null;
let shareOpen = false;

function renderShare() {
  const section = document.getElementById('share-section');
  const linksEl = document.getElementById('share-links');
  if (!shareData || !shareData.links || shareData.links.length === 0) {
    section.style.display = 'none'; return;
  }
  section.style.display = state.isLanding ? 'block' : 'none';
  if (!state.isLanding) { shareOpen = false; linksEl.innerHTML = ''; return; }

  const toggle = document.getElementById('share-toggle');
  toggle.textContent = shareData.label || 'SHARE';
  toggle.onclick = () => {
    shareOpen = !shareOpen;
    linksEl.innerHTML = '';
    if (shareOpen) {
      shareData.links.forEach((link, i) => {
        const a = document.createElement('a');
        a.className = 'share-link';
        a.href = link.url.includes('@') && !link.url.startsWith('mailto:') ? 'mailto:' + link.url : link.url;
        a.target = '_blank'; a.rel = 'noopener';
        a.textContent = link.label;
        linksEl.appendChild(a);
        setTimeout(() => a.classList.add('visible'), i * 80 + 40);
      });
    }
  };
}

async function init() {
  try {
    const result = await sanityFetch(`*[_type == "portfolioSettings"][0]{
      accentColor, "landingBg": landingBg.asset->url, "siteBg": siteBg.asset->url
    }`);
    const categories = await sanityFetch(`*[_type == "category"] | order(order asc) {
      _id, name, order,
      "subcategories": *[_type == "project" && references(^._id)] | order(order asc) {
        _id, name, order, images[]{ "url": asset->url, alt }
      }
    }`);
    shareData = await sanityFetch(`*[_type == "shareSettings"][0]{
      label, links[]{ label, url }
    }`);
    portfolioData = { settings: result || {}, categories: categories || [] };
    if (portfolioData.settings.accentColor) applyAccentColor(portfolioData.settings.accentColor);
  } catch(e) {
    console.warn('Sanity error', e);
    portfolioData = { settings: {}, categories: [] };
  }
  const ls = document.getElementById('loading-screen');
  ls.classList.add('fade-out');
  setTimeout(() => ls.remove(), 600);
  renderBg(true); renderNav(); renderThumbs(); renderPreview(); renderShare();
}
init();
</script>
</body>
</html>
